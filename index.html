<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="./script.js" defer></script>
    <title>Chi-fu-mi</title>
</head>

<body>
    <h1>Chi-fu-mi GAME</h1>
    <!-- <img src="" alt=""> Mets un image de scissor et autre mdrr -->
    <section>
        <p>
            Règles:
            La partie se déroule en 3 manches.
            Si tu en gagnes au moins 2 tu remportes la victoire!
        </p>
        <h2>Place your bets</h2>
        <div>
            <p id="user-choice"></p>
            <p id="bot-choice"></p>
        </div>

        <div id="clasic">
            <button id="rock"><img src="./assets/img/pierreT.png" alt="image of rosette rock"></button>
            <button id="scissor"><img src="./assets/img/scissor.png" alt="image of scissor"></button>
            <button id="paper"><img src="./assets/img/paper.png" alt="image ofa funny paper"></button>
            <button id="lizard"><img src="./assets/img/lizard.png" alt="image of a funny lizard"></button>
            <button id="spock"><img src="./assets/img/spock-caricature.png" alt="caricature of spock"></button>
        </div>

        <p id="result-set"></p>
        <p id="equality"></p>
        <p id="score"></p>
        <p id="result"></p>

        <button id="reset">reset</button>
    </section>

</body>

</html>
